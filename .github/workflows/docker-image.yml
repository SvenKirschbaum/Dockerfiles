name: Docker Image

on:
  workflow_call:
    inputs:
      image:
        description: Image name below registry.gitlab.com/fallobst22/images
        required: true
        type: string
      context:
        description: Docker build context directory
        required: true
        type: string
      version_offset:
        description: Offset added to github.run_number to continue TeamCity numbering
        required: true
        type: number
      push_latest:
        description: Whether to also push the latest tag on main
        required: true
        type: boolean
    secrets:
      GITLAB_REGISTRY_USERNAME:
        required: false
      GITLAB_REGISTRY_PASSWORD:
        required: false

env:
  REGISTRY: registry.gitlab.com
  IMAGE_NAMESPACE: fallobst22/images

jobs:
  build:
    name: Build ${{ inputs.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute Docker metadata
        id: meta
        env:
          IMAGE: ${{ inputs.image }}
          PUSH_LATEST: ${{ inputs.push_latest }}
          VERSION_OFFSET: ${{ inputs.version_offset }}
        run: |
          version=$((GITHUB_RUN_NUMBER + VERSION_OFFSET))
          image_ref="${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE}"
          tags="${image_ref}:v${version}"

          if [[ "${PUSH_LATEST}" == "true" ]]; then
            tags="${tags}"$'\n'"${image_ref}:latest"
          fi

          {
            echo "version=${version}"
            echo "primary_tag=${image_ref}:v${version}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/Dockerfile
          load: true
          pull: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: ${{ steps.meta.outputs.primary_tag }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Log in to GitLab Container Registry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_REGISTRY_USERNAME }}
          password: ${{ secrets.GITLAB_REGISTRY_PASSWORD }}

      - name: Push Docker image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            docker push "${tag}"
          done <<< "${TAGS}"
