name: Docker Image

on:
  workflow_call:
    inputs:
      image:
        description: Image name below registry.gitlab.com/fallobst22/images
        required: true
        type: string
      context:
        description: Docker build context directory
        required: true
        type: string
      version_offset:
        description: Offset added to github.run_number to continue TeamCity numbering
        required: true
        type: number
      push_latest:
        description: Whether to also push the latest tag on main
        required: true
        type: boolean
    secrets:
      GITLAB_REGISTRY_USERNAME:
        required: false
      GITLAB_REGISTRY_PASSWORD:
        required: false
      FLUX_IMAGE_WEBHOOK_URLS:
        required: false

env:
  REGISTRY: registry.gitlab.com
  IMAGE_NAMESPACE: fallobst22/images

jobs:
  build:
    name: Build ${{ inputs.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute Docker metadata
        id: meta
        env:
          IMAGE: ${{ inputs.image }}
          PUSH_LATEST: ${{ inputs.push_latest }}
          VERSION_OFFSET: ${{ inputs.version_offset }}
        run: |
          version=$((GITHUB_RUN_NUMBER + VERSION_OFFSET))
          image_ref="${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE}"
          tags="${image_ref}:v${version}"

          if [[ "${PUSH_LATEST}" == "true" ]]; then
            tags="${tags}"$'\n'"${image_ref}:latest"
          fi

          {
            echo "version=${version}"
            echo "primary_tag=${image_ref}:v${version}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/Dockerfile
          load: true
          pull: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.primary_tag }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Log in to GitLab Container Registry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_REGISTRY_USERNAME }}
          password: ${{ secrets.GITLAB_REGISTRY_PASSWORD }}

      - name: Push Docker image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            docker push "${tag}"
          done <<< "${TAGS}"

      - name: Trigger Flux image scans
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          IMAGE: ${{ inputs.image }}
          WEBHOOK_URLS: ${{ secrets.FLUX_IMAGE_WEBHOOK_URLS }}
        run: |
          set -euo pipefail

          if [[ -z "${WEBHOOK_URLS}" ]]; then
            echo "No Flux image webhook URLs configured; skipping."
            exit 0
          fi

          oidc_token="$(
            curl -fsSL \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=notification-controller" \
              | jq -r '.value'
          )"
          payload="$(jq -cn --arg image "${IMAGE}" '{images: [$image]}')"

          while IFS= read -r webhook_url; do
            if [[ -z "${webhook_url}" ]]; then
              continue
            fi

            curl -fsS \
              -X POST \
              -H "Authorization: Bearer ${oidc_token}" \
              -H "Content-Type: application/json" \
              --data "${payload}" \
              "${webhook_url}"
          done <<< "${WEBHOOK_URLS}"
